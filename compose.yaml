services:

  database:
    image: postgres:15-alpine
    container_name: sepa26_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: sepa26
    ports:
      - "5432:5432"
    volumes:
      - sepa26_db_data:/var/lib/postgresql/data

  sepa26_app:
    image: sepa26-server
    container_name: sepa26_app
    ports:
      - "8100:8100"
    environment:
      - DB_HOST=database
    depends_on:
      - database
    restart: always

volumes:
  sepa26_db_data: