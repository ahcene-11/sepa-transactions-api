<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Erreur 500 - Problème Technique</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f4f4f9;
            color: #333;
        }
        h1 {
            font-size: 60px;
            color: #f0ad4e;
            margin-bottom: 10px;
        }
        p {
            font-size: 20px;
        }
        .message {
            margin: 20px auto;
            max-width: 600px;
            color: #666;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #0275d8;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .btn:hover {
            background-color: #025aa5;
        }
    </style>
</head>
<body>
<h1>500</h1>
<h2>Oups ! Nos serveurs ont trébuché.</h2>
<p class="message">
    Une erreur inattendue s'est produite de notre côté. Pas d'inquiétude, ce n'est pas de votre faute !
    Nos développeurs ont été prévenus et travaillent déjà à résoudre le problème.
</p>
<a href="/" class="btn">Retour à l'accueil</a>
</body>
</html>
