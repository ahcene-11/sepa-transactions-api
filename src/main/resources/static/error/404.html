<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Erreur 404 - Page Introuvable</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Pour centrer verticalement sur toute la page */
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 500px;
            padding: 40px;
        }

        .error-image {
            width: 250px;
            height: auto;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 72px;
            color: #d9534f;
            margin: 0 0 10px 0;
        }
        h2 { margin-bottom: 20px; font-weight: 300; }
        p { font-size: 18px; color: #666; line-height: 1.5; margin-bottom: 30px;}
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background-color: #0275d8;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.2s;
        }
        .btn:hover { background-color: #025aa5; }
    </style>
</head>
<body>
<div class="container">
    <img src="/images/bot.jpg" alt="Oups robot désolé" class="error-image">

    <h1>404</h1>
    <h2>Oups ! Page introuvable.</h2>
    <p>Il semblerait que vous vous soyez perdu en chemin. Cette page n'existe pas ou a été déplacée.</p>
    <a href="/" class="btn">Retour à l'accueil</a>
</div>
</body>
</html>
